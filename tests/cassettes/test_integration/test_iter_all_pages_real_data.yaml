        Private Collection\",\"hi_res\":false}},\"framing\":{\"glazing\":{\"date\":[{\"from\":\"2024\",\"to\":\"2024\",\"value\":\"2024-08-22\"}],\"type\":\"unglazed\"}},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"description\":[{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">While working on his meticulous paintings
        in the studio, Seurat also made small studies outdoors on wooden panels, which
        he called <span class=\\\"dokuwiki_italic\\\">croquetons</span>. He used these
        panels to record first-hand the atmospheric effects of nature, its play of
        light and colour, before transforming them into large-scale canvases using
        his rigorous pointillist method.</p><p class=\\\"dokuwiki_paragraph\\\">This
        study was made while the artist worked on <span class=\\\"dokuwiki_italic\\\">A
        Sunday Afternoon on the Island of La Grande Jatte</span> (1884-6, Art Institute
        of Chicago). Seurat paints the Seine River as a band running across the top
        of the panel, using distinctive dabs of blue and pink to suggest a gleaming
        surface, and explores the placement of an isolated figure on the greenery
        of the riverbank &ndash; a space that becomes populated with groups of leisurely
        middle- and upper-class Parisians in the final work. The sporadic dark shapes
        underneath the paint surface might indicate other figures Seurat initially
        tested out, before covering them up with his typical abbreviated marks of
        contrasting colours.</p><p class=\\\"dokuwiki_paragraph\\\">In 1900, this
        study and <span class=\\\"dokuwiki_italic\\\">La Grande Jatte</span> were
        exhibited together at the first prominent retrospective of Seurat&rsquo;s
        work after his death in 1891.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short
        text\",\"value\":\"While working on his meticulous paintings in the studio,
        Seurat also made small studies outdoors on wooden panels, which he called
        croquetons. He used these panels to record first-hand the atmospheric effects
        of nature, its play of light and colour, before transforming them into large-scale
        canvases using his rigorous pointillist method.\\n\\nThis study was made while
        the artist worked on A Sunday Afternoon on the Island of La Grande Jatte (1884-6,
        Art Institute of Chicago). Seurat paints the Seine River as a band running
        across the top of the panel, using distinctive dabs of blue and pink to suggest
        a gleaming surface, and explores the placement of an isolated figure on the
        greenery of the riverbank \u2013 a space that becomes populated with groups
        of leisurely middle- and upper-class Parisians in the final work. The sporadic
        dark shapes underneath the paint surface might indicate other figures Seurat
        initially tested out, before covering them up with his typical abbreviated
        marks of contrasting colours.\\n\\nIn 1900, this study and La Grande Jatte
        were exhibited together at the first prominent retrospective of Seurat\u2019s
        work after his death in 1891.\"},{\"formatted\":\"<p class=\\\"dokuwiki_paragraph\\\">While
        working on his meticulous paintings in the studio, Seurat also made small
        studies outdoors on wooden panels, which he called <span class=\\\"dokuwiki_italic\\\">croquetons</span>.
        He used these panels to record first-hand the atmospheric effects of nature,
        its play of light and colour, before transforming them into large-scale canvases
        using his rigorous pointillist method.</p><p class=\\\"dokuwiki_paragraph\\\">This
        study was made while the artist worked on <span class=\\\"dokuwiki_italic\\\">A
        Sunday Afternoon on the Island of La Grande Jatte</span> (1884-6, Art Institute
        of Chicago). Seurat paints the Seine River as a band running across the top
        of the panel, using distinctive dabs of blue and pink to suggest a gleaming
        surface, and explores the placement of an isolated figure on the greenery
        of the riverbank &ndash; a space that becomes populated with groups of leisurely
        middle- and upper-class Parisians in the final work. The sporadic dark shapes
        underneath the paint surface might indicate other figures Seurat initially
        tested out, before covering them up with his typical abbreviated marks of
        contrasting colours.</p><p class=\\\"dokuwiki_paragraph\\\">In 1900, this
        study and <span class=\\\"dokuwiki_italic\\\">La Grande Jatte</span> were
        exhibited together at the first prominent retrospective of Seurat&rsquo;s
        work after his death in 1891.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long
        text\",\"value\":\"While working on his meticulous paintings in the studio,
        Seurat also made small studies outdoors on wooden panels, which he called
        croquetons. He used these panels to record first-hand the atmospheric effects
        of nature, its play of light and colour, before transforming them into large-scale
        canvases using his rigorous pointillist method.\\n\\nThis study was made while
        the artist worked on A Sunday Afternoon on the Island of La Grande Jatte (1884-6,
        Art Institute of Chicago). Seurat paints the Seine River as a band running
        across the top of the panel, using distinctive dabs of blue and pink to suggest
        a gleaming surface, and explores the placement of an isolated figure on the
        greenery of the riverbank \u2013 a space that becomes populated with groups
        of leisurely middle- and upper-class Parisians in the final work. The sporadic
        dark shapes underneath the paint surface might indicate other figures Seurat
        initially tested out, before covering them up with his typical abbreviated
        marks of contrasting colours.\\n\\nIn 1900, this study and La Grande Jatte
        were exhibited together at the first prominent retrospective of Seurat\u2019s
        work after his death in 1891.\"}],\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
