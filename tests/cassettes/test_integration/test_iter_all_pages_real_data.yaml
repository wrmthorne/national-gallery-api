        Object Number\",\"value\":\"N05638\"},{\"type\":\"sort number\",\"value\":\"l31352\"}],\"access\":{\"item\":{\"privacy\":false,\"public_approved\":true},\"media\":{\"public_image\":false,\"download\":false,\"zoom\":false,\"hi_res\":false}},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"description\":[{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">This portrait of Gainsborough&rsquo;s older
        daughter Mary was produced in 1777 around the same time as a portrait made
        of his youngest, <span class=\\\"dokuwiki_italic\\\">Margaret Gainsborough,
        holding a Theorbo</span> (NG6687), which entered the National Gallery Collection
        in 2019. Unusually, the artist has inscribed the work with the name of the
        sitter and signed it, indicating the work is complete. These paintings of
        the two sisters were kept by the artist&rsquo;s descendants throughout the
        nineteenth century, reflecting their importance to the family.</p><p class=\\\"dokuwiki_paragraph\\\">Both
        portraits are notably unfinished, though Margaret&rsquo;s is less finished
        than this painting of Mary, as are <span class=\\\"dokuwiki_italic\\\">The
        Artist&rsquo;s Daughters, chasing a Butterfly</span> (NG1811) and <span class=\\\"dokuwiki_italic\\\">The
        Artist&rsquo;s Daughters, playing with a Cat</span> (NG3812), also in the
        National Gallery Collection. The loose handling and experimentation adopted
        in all these works reflect the intimate relationship the artist held with
        each sitter. Together they demonstrate his distinctive approach to representing
        his family.</p><p class=\\\"dokuwiki_paragraph\\\">This work also reflects
        Gainsborough&rsquo;s knowledge of, and desire to emulate, paintings by great
        artists from previous generations. The painting to which the portrait of Mary
        alludes, is now known to be a painting by Peter Paul Rubens (1577&ndash;1640)
        of his wife.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short text\",\"value\":\"This
        portrait of Gainsborough's older daughter Mary was produced in 1777 around
        the same time as a portrait made of his youngest, Margaret Gainsborough, holding
        a Theorbo (NG6687), which entered the National Gallery Collection in 2019.
        Unusually, the artist has inscribed the work with the name of the sitter and
        signed it, indicating the work is complete. These paintings of the two sisters
        were kept by the artist\u2019s descendants throughout the nineteenth century,
        reflecting their importance to the family.\\n\\nBoth portraits are notably
        unfinished, though Margaret\u2019s is less finished than this painting of
        Mary, as are The Artist\u2019s Daughters, chasing a Butterfly (NG1811) and
        The Artist\u2019s Daughters, playing with a Cat (NG3812), also in the National
        Gallery Collection. The loose handling and experimentation adopted in all
        these works reflect the intimate relationship the artist held with each sitter.
        Together they demonstrate his distinctive approach to representing his family.\\n\\nThis
        work also reflects Gainsborough\u2019s knowledge of, and desire to emulate,
        paintings by great artists from previous generations. The painting to which
        the portrait of Mary alludes, is now known to be a painting by Peter Paul
        Rubens (1577\u20131640) of his wife.\"},{\"formatted\":\"<p class=\\\"dokuwiki_paragraph\\\">This
        portrait of <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0PFP-0001-0000-0000.htm\\\">Gainsborough&rsquo;s</a>
        older daughter Mary was produced in 1777 around the same time as a portrait
        made of his youngest, <span class=\\\"dokuwiki_italic\\\"><a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0WUY-0008-0000-0000.htm\\\">Margaret Gainsborough,
        holding a Theorbo</a></span> (NG6687), which entered the National Gallery
        Collection in 2019. Unusually, the artist has inscribed the work with the
        name of the sitter and signed it, indicating the work is complete. These paintings
        of the two sisters were kept by the artist&rsquo;s descendants throughout
        the nineteenth century, reflecting their importance to the family.</p><p class=\\\"dokuwiki_paragraph\\\">Both
        portraits are notably unfinished, though Margaret&rsquo;s is less finished
        than this painting of Mary, as are <span class=\\\"dokuwiki_italic\\\"><a
        class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0D0S-0001-0000-0000.htm\\\">The
        Artist&rsquo;s Daughters, chasing a Butterfly</a></span> (NG1811) and <span
        class=\\\"dokuwiki_italic\\\"><a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0D9B-0001-0000-0000.htm\\\">The
        Artist&rsquo;s Daughters, playing with a Cat</a></span> (NG3812), also in
        the National Gallery Collection. The loose handling and experimentation adopted
        in all these works reflect the intimate relationship the artist held with
        each sitter. Together they demonstrate his distinctive approach to representing
        his family.</p><p class=\\\"dokuwiki_paragraph\\\">This work also reflects
        Gainsborough&rsquo;s knowledge of, and desire to emulate, paintings by great
        artists from previous generations. The painting to which the portrait of Mary
        alludes, is now known to be a painting by <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0Q6P-0001-0000-0000.htm\\\">Peter
        Paul Rubens</a> (1577&ndash;1640) of his wife.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long
        text\",\"value\":\"This portrait of Gainsborough's older daughter Mary was
        produced in 1777 around the same time as a portrait made of his youngest,
        Margaret Gainsborough, holding a Theorbo (NG6687), which entered the National
        Gallery Collection in 2019. Unusually, the artist has inscribed the work with
        the name of the sitter and signed it, indicating the work is complete. These
        paintings of the two sisters were kept by the artist\u2019s descendants throughout
        the nineteenth century, reflecting their importance to the family.\\n\\nBoth
        portraits are notably unfinished, though Margaret\u2019s is less finished
        than this painting of Mary, as are The Artist\u2019s Daughters, chasing a
        Butterfly (NG1811) and The Artist\u2019s Daughters, playing with a Cat (NG3812),
        also in the National Gallery Collection. The loose handling and experimentation
        adopted in all these works reflect the intimate relationship the artist held
        with each sitter. Together they demonstrate his distinctive approach to representing
        his family.\\n\\nThis work also reflects Gainsborough\u2019s knowledge of,
        and desire to emulate, paintings by great artists from previous generations.
        The painting to which the portrait of Mary alludes, is now known to be a painting
        by Peter Paul Rubens (1577\u20131640) of his wife.\"}],\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
