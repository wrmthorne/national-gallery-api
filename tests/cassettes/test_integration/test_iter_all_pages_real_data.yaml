        Private collection\",\"hi_res\":false}},\"framing\":{\"glazing\":{\"date\":[{\"from\":\"2020\",\"to\":\"2020\",\"value\":\"2020-08-19\"}],\"type\":\"glazed,
        material unspecified\"}},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"description\":[{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">The identity of the man in this powerful
        and realistic portrait is unknown, although two Latin inscriptions state that
        the work was made in 1591 and that the sitter was 56.</p><p class=\\\"dokuwiki_paragraph\\\">There
        are no obvious clues to his profession, but he is clearly a man of some standing.
        His advancing age is charted in the fine lines on his forehead, the slightly
        furrowed brow and the dark circles beneath his eyes. He wears a <a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0FVB-0008-0000-0000.htm\\\">doublet</a> trimmed
        with brown fur, black quilted satin sleeves and a delicate ruff. His expression
        is arresting and he engages the viewer with a direct gaze.</p><p class=\\\"dokuwiki_paragraph\\\">Pourbus&rsquo;s
        clients came largely from the patrician and merchant classes at this stage
        of his career. However, the outstanding technical proficiency displayed in
        such portraits would soon bring him to the attention of many illustrious patrons
        abroad, and led to him travelling across Europe from Mantua to Naples and
        Paris.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short text\",\"value\":\"The
        identity of the man in this powerful and realistic portrait is unknown, although
        two Latin inscriptions state that the work was made in 1591 and that the sitter
        was 56.\\n\\nThere are no obvious clues to his profession, but he is clearly
        a man of some standing. His advancing age is charted in the fine lines on
        his forehead, the slightly furrowed brow and the dark circles beneath his
        eyes. He wears a doublet trimmed with brown fur, black quilted satin sleeves
        and a delicate ruff. His expression is arresting and he engages the viewer
        with a direct gaze.\\n\\nPourbus\u2019s clients came largely from the patrician
        and merchant classes at this stage of his career. However, the outstanding
        technical proficiency displayed in such portraits would soon bring him to
        the attention of many illustrious patrons abroad, and led to him travelling
        across Europe from Mantua to Naples and Paris.\"},{\"formatted\":\"<p class=\\\"dokuwiki_paragraph\\\">The
        identity of the man in this extraordinarily powerful and realistic portrait
        has not yet been determined, although two Latin inscriptions provide some
        clues. In the upper corners, we can read that the portrait was painted &lsquo;in
        the year of the Lord 1591&rsquo; (&lsquo;AN[NO] D[OMI]NI 1591&rsquo;), when
        the sitter was &lsquo;in his 56th year&rsquo; (&lsquo;AETATIS SUAE 56&rsquo;).
        A third, smaller inscription beneath the sitter&rsquo;s age declares it to
        be made by &lsquo;<a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/02AC-0009-0000-0000.htm\\\">Frans
        Pourbus the Younger</a>, son of <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0T83-0001-0000-0000.htm\\\">Frans
        the Elder</a>&rsquo; (&lsquo;F[RANS]. POURBUS FIL[IUS] FR[ANS] FECIT&rsquo;).
        In 1591 Pourbus lived in Antwerp, working largely for the noble and merchant
        classes, to which the sitter must have belonged. Trained in a family of successful
        Flemish painters, Pourbus&rsquo;s outstanding technical proficiency in portraiture
        would soon bring him to the attention of many illustrious patrons abroad,
        and led to him travelling across Europe from Mantua to Naples and Paris.</p><p
        class=\\\"dokuwiki_paragraph\\\">The fine lines on the sitter&rsquo;s forehead,
        the papery skin around his eyes, the slightly furrowed brow and the dark circles
        beneath his eyes capture his advancing age. A once rich head of red hair is
        now grey and cropped short, but there are still wisps of ginger tones in his
        wiry beard and moustache. Pourbus delighted in the slightly unruly quality
        of both, rendering every whisker and hair with great delicacy and energy.</p><p
        class=\\\"dokuwiki_paragraph\\\">The sitter wears a <a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0FVB-0008-0000-0000.htm\\\">doublet</a> trimmed
        with soft brown fur, black quilted satin sleeves and a delicate ruff which
        matches his cuffs. Ruffs were highly fashionable items of clothing and denoted
        wealth and status. He holds a soft kid leather glove in his right hand and
        stands in front of a table covered in a green cloth, against a plain background.
        His expression is arresting, and he engages the viewer with a direct gaze.
        The upright pose with a hand placed on a hip is one often reserved for aristocracy
        or royalty, thus ennobling our sitter. The viewpoint is high, so the sitter&rsquo;s
        figure would have looked even more imposing when the portrait was hung high
        on a wall in his comfortable and spacious house.</p><p class=\\\"dokuwiki_paragraph\\\">There
        are no obvious clues to the sitter&rsquo;s profession, but he is clearly a
        man of some standing. A glove can sometimes denote a betrothal, but considering
        the man&rsquo;s age, it would seem more likely to be a symbol of wealth. The
        <a class=\\\"dokuwiki_link\\\" href=\\\"{$BASE_URL}/dokuwiki-1234450934\\\">pendant</a>
        <span class=\\\"dokuwiki_italic\\\">Portrait of a Woman Aged 54</span> (Museum
        of Fine Arts, San Francisco) shows his wife in an equally sophisticated dress
        with similar attention to detail. The two paintings once hung together in
        the Schloss Weissenstein (Pommersfelden, Germany) and belonged to the impressive
        collection of Lothar Franz von Sch&ouml;nborn, Archbishop-Elector of Mainz.
        When the paintings were sold (and separated) in 1867, the noted art historian
        Th&eacute;ophile Thor&eacute;-B&uuml;rger described this portrait as &lsquo;a
        masterpiece of truth and expression&rsquo;. At the same sale, Thor&eacute;-B&uuml;rger
        would eventually buy <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0Q0C-0001-0000-0000.htm\\\">Johannes
        Vermeer&rsquo;s</a> <span class=\\\"dokuwiki_italic\\\"><a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0CTX-0001-0000-0000.htm\\\">Young Woman seated
        at a Virginal</a></span>.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long text\",\"value\":\"The
        identity of the man in this extraordinarily powerful and realistic portrait
        has not yet been determined, although two Latin inscriptions provide some
        clues. In the upper corners, we can read that the portrait was painted \u2018in
        the year of the Lord 1591\u2019 (\u2018AN[NO] D[OMI]NI 1591\u2019), when the
        sitter was \u2018in his 56th year\u2019 (\u2018AETATIS SUAE 56\u2019). A third,
        smaller inscription beneath the sitter\u2019s age declares it to be made by
        \u2018Frans Pourbus the Younger, son of Frans the Elder\u2019 (\u2018F[RANS].
        POURBUS FIL[IUS] FR[ANS] FECIT\u2019). In 1591 Pourbus lived in Antwerp, working
        largely for the noble and merchant classes, to which the sitter must have
        belonged. Trained in a family of successful Flemish painters, Pourbus\u2019s
        outstanding technical proficiency in portraiture would soon bring him to the
        attention of many illustrious patrons abroad, and led to him travelling across
        Europe from Mantua to Naples and Paris.\\n\\nThe fine lines on the sitter\u2019s
        forehead, the papery skin around his eyes, the slightly furrowed brow and
        the dark circles beneath his eyes capture his advancing age. A once rich head
        of red hair is now grey and cropped short, but there are still wisps of ginger
        tones in his wiry beard and moustache. Pourbus delighted in the slightly unruly
        quality of both, rendering every whisker and hair with great delicacy and
        energy.\\n\\nThe sitter wears a doublet trimmed with soft brown fur, black
        quilted satin sleeves and a delicate ruff which matches his cuffs. Ruffs were
        highly fashionable items of clothing and denoted wealth and status. He holds
        a soft kid leather glove in his right hand and stands in front of a table
        covered in a green cloth, against a plain background. His expression is arresting,
        and he engages the viewer with a direct gaze. The upright pose with a hand
        placed on a hip is one often reserved for aristocracy or royalty, thus ennobling
        our sitter. The viewpoint is high, so the sitter\u2019s figure would have
        looked even more imposing when the portrait was hung high on a wall in his
        comfortable and spacious house.\\n\\nThere are no obvious clues to the sitter\u2019s
        profession, but he is clearly a man of some standing. A glove can sometimes
        denote a betrothal, but considering the man\u2019s age, it would seem more
        likely to be a symbol of wealth. The pendant Portrait of a Woman Aged 54 (Museum
        of Fine Arts, San Francisco) shows his wife in an equally sophisticated dress
        with similar attention to detail. The two paintings once hung together in
        the Schloss Weissenstein (Pommersfelden, Germany) and belonged to the impressive
        collection of Lothar Franz von Sch\xF6nborn, Archbishop-Elector of Mainz.
        When the paintings were sold (and separated) in 1867, the noted art historian
        Th\xE9ophile Thor\xE9-B\xFCrger described this portrait as \u2018a masterpiece
        of truth and expression\u2019. At the same sale, Thor\xE9-B\xFCrger would
        eventually buy Johannes Vermeer\u2019s Young Woman seated at a Virginal.\"}],\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
