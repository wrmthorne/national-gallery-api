        to 2028-04-23\"}],\"public_image\":true,\"download\":false,\"zoom\":true,\"hi_res\":false}},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"description\":[{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">Between late August or early September 1890
        and February 1891, Monet painted a group of twenty-five compositions of grainstacks.
        Conceived as a decorative ensemble rather than individual pictures, the <span
        class=\\\"dokuwiki_italic\\\">Stacks of Wheat</span> are the first of his
        &ldquo;series&rdquo; paintings &ndash; a practice that would mark a breakthrough
        in his career.</p><p class=\\\"dokuwiki_paragraph\\\">Monet found this motif
        in a field near his studio in Giverny. Over the course of the seasons, he
        depicted this rural landscape repeatedly, experimenting with different viewpoints,
        compositions and light conditions. Here, a monumental grain stack dominates
        the left side of the canvas. Set against a hilly backdrop, with a few houses
        scattered in the distance, it is bathed by the warm light of the setting sun.</p><p
        class=\\\"dokuwiki_paragraph\\\">In May 1891, Monet exhibited for the first
        time fifteen <span class=\\\"dokuwiki_italic\\\">Stacks of Wheat</span> at
        Durand-Ruel&rsquo;s in Paris. Unanimously acclaimed, the show will mark a
        pivotal moment in Monet&rsquo;s career, establishing his fame as one of the
        most successful artists of the day.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short
        text\",\"value\":\"Between late August or early September 1890 and February
        1891, Monet painted a group of twenty-five compositions of grainstacks. Conceived
        as a decorative ensemble rather than individual pictures, the Stacks of Wheat
        are the first of his \u201Cseries\u201D paintings \u2013 a practice that would
        mark a breakthrough in his career.\\n\\nMonet found this motif in a field
        near his studio in Giverny. Over the course of the seasons, he depicted this
        rural landscape repeatedly, experimenting with different viewpoints, compositions
        and light conditions. Here, a monumental grain stack dominates the left side
        of the canvas. Set against a hilly backdrop, with a few houses scattered in
        the distance, it is bathed by the warm light of the setting sun.\\n\\nIn May
        1891, Monet exhibited for the first time fifteen Stacks of Wheat at Durand-Ruel\u2019s
        in Paris. Unanimously acclaimed, the show will mark a pivotal moment in Monet\u2019s
        career, establishing his fame as one of the most successful artists of the
        day.\"},{\"formatted\":\"<p class=\\\"dokuwiki_paragraph\\\">Between late
        August or early September 1890 and February 1891, <a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0PPQ-0001-0000-0000.htm\\\">Monet</a> painted
        a group of twenty-five compositions of grainstacks. Conceived as a decorative
        ensemble rather than individual pictures, the <span class=\\\"dokuwiki_italic\\\">Stacks
        of Wheat</span> are the first of his &ldquo;series&rdquo; paintings &ndash;
        a practice that would mark a breakthrough in his career.</p><p class=\\\"dokuwiki_paragraph\\\">Monet
        found this motif in a field near his studio in Giverny. Over the course of
        the seasons, he depicted this rural landscape repeatedly, experimenting with
        different viewpoints, compositions and light conditions. Here, a monumental
        grain stack dominates the left side of the canvas. Set against a hilly backdrop,
        with a few houses scattered in the distance, it is bathed by the warm light
        of the setting sun.</p><p class=\\\"dokuwiki_paragraph\\\">Through a stunning
        array of hot oranges, pinks, purples and light blues, Monet revels in rendering
        the atmospheric effects surrounding the objects &ndash; what he called the
        <span class=\\\"dokuwiki_italic\\\">enveloppe</span>, &ldquo;the same light
        diffused over everything&rdquo;. &ldquo;To me, the motif itself is an insignificant
        factor&rdquo;, he wrote, &ldquo;What I want to reproduce is what exists between
        the motif and me&rdquo;. Yet, the stacks of wheat bore a specific meaning
        to late 19th century viewers:  a source of income for the farmers, who carefully
        arranged the wheat in these characteristic conical shapes, they were a key
        feature of the French countryside, symbolising prosperity and the fertility
        of the land.</p><p class=\\\"dokuwiki_paragraph\\\">Monet likely begun working
        on the canvas <span class=\\\"dokuwiki_italic\\\">en plein air</span> on a
        winter day, then finished it over multiple sessions in his studio. Some <span
        class=\\\"dokuwiki_italic\\\"><a class=\\\"dokuwiki_link\\\" href=\\\"{$BASE_URL}/dokuwiki-1198620230\\\">pentimenti</a></span>
        &ndash; changes to the composition &ndash; as well as the crusty paint, thickly
        applied in heavy layers, testify to the artist&rsquo;s relentless experimentation.
        At some point, Monet modified the stack&rsquo;s position, making its top coincide
        with the line of hills in the background. The geometrical quality of this
        arrangement, which sets it apart from most pictures of the series, was praised
        by the critic Camille Mauclair, who saw in it &ldquo;a surety of execution
        that is almost mathematical&rdquo;.</p><p class=\\\"dokuwiki_paragraph\\\">In
        May 1891, Monet exhibited for the first time fifteen Stacks of Wheat at Durand-Ruel&rsquo;s
        in Paris. Prefacing the exhibition catalogue, Gustave Geffroy considered the
        series a &ldquo;victorious artistic demonstration&rdquo; conveying &ldquo;the
        sensation of the ephemeral instant that comes into existence and never again
        returns&rdquo;. Unanimously acclaimed, the show will mark a pivotal moment
        in Monet&rsquo;s career, establishing his fame as one of the most successful
        artists of the day.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long text\",\"value\":\"Between
        late August or early September 1890 and February 1891, Monet painted a group
        of twenty-five compositions of grainstacks. Conceived as a decorative ensemble
        rather than individual pictures, the Stacks of Wheat are the first of his
        \u201Cseries\u201D paintings \u2013 a practice that would mark a breakthrough
        in his career.\\n\\nMonet found this motif in a field near his studio in Giverny.
        Over the course of the seasons, he depicted this rural landscape repeatedly,
        experimenting with different viewpoints, compositions and light conditions.
        Here, a monumental grain stack dominates the left side of the canvas. Set
        against a hilly backdrop, with a few houses scattered in the distance, it
        is bathed by the warm light of the setting sun.\\n\\nThrough a stunning array
        of hot oranges, pinks, purples and light blues, Monet revels in rendering
        the atmospheric effects surrounding the objects \u2013 what he called the
        enveloppe, \u201Cthe same light diffused over everything\u201D. \u201CTo me,
        the motif itself is an insignificant factor\u201D, he wrote, \u201CWhat I
        want to reproduce is what exists between the motif and me\u201D. Yet, the
        stacks of wheat bore a specific meaning to late 19th century viewers:  a source
        of income for the farmers, who carefully arranged the wheat in these characteristic
        conical shapes, they were a key feature of the French countryside, symbolising
        prosperity and the fertility of the land.\\n\\nMonet likely begun working
        on the canvas en plein air on a winter day, then finished it over multiple
        sessions in his studio. Some pentimenti \u2013 changes to the composition
        \u2013 as well as the crusty paint, thickly applied in heavy layers, testify
        to the artist\u2019s relentless experimentation. At some point, Monet modified
        the stack\u2019s position, making its top coincide with the line of hills
        in the background. The geometrical quality of this arrangement, which sets
        it apart from most pictures of the series, was praised by the critic Camille
        Mauclair, who saw in it \u201Ca surety of execution that is almost mathematical\u201D.\\n\\nIn
        May 1891, Monet exhibited for the first time fifteen Stacks of Wheat at Durand-Ruel\u2019s
        in Paris. Prefacing the exhibition catalogue, Gustave Geffroy considered the
        series a \u201Cvictorious artistic demonstration\u201D conveying \u201Cthe
        sensation of the ephemeral instant that comes into existence and never again
        returns\u201D. Unanimously acclaimed, the show will mark a pivotal moment
