        to present\"}],\"public_image\":false,\"download\":false,\"zoom\":false,\"hi_res\":false}},\"framing\":{\"glazing\":{\"type\":\"unglazed\"}},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"description\":[{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">The figure ascending the stairs is Marcus
        Vipsanius Agrippa (63?\u201212 BC): general, statesman, architect and close
        friend to Augustus Caesar, who reigned as the first Roman Emperor from 27
        BC. Agrippa moves through his impressive villa, away from the figures making
        their requests, and the objects they have given, on the landing below. The
        details of the image are precisely represented, from the dramatic fall of
        Agrippa&rsquo;s red cape, the wide expanses of marble, to the objects laid
        over the tiger skin. The crowd of people on the right demonstrate the artist&rsquo;s
        abilities in capturing variations of emotion.</p><p class=\\\"dokuwiki_paragraph\\\">The
        sculpture of Augustus which represents imperial power and authority, dominates
        the foreground. It was based on the now-celebrated &lsquo;Augustus of Prima
        Porta&rsquo;, which had only been rediscovered in 1863. This underscores Alma-Tadema&rsquo;s
        desire for his work to be current and historically accurate.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short
        text\",\"value\":\"The figure ascending the stairs is Marcus Vipsanius Agrippa
        (63?\u201212 BC): general, statesman, architect and close friend to Augustus
        Caesar, who reigned as the first Roman Emperor from 27 BC. Agrippa moves through
        his impressive villa, away from the figures making their requests, and the
        objects they have given, on the landing below. The details of the image are
        precisely represented, from the dramatic fall of Agrippa's red cape, the wide
        expanses of marble, to the objects laid over the tiger skin. The crowd of
        people on the right demonstrate the artist's abilities in capturing variations
        of emotion.The sculpture of Augustus which represents imperial power and authority,
        dominates the foreground. It was based on the now-celebrated 'Augustus of
        Prima Porta', which had only been rediscovered in 1863. This underscores Alma-Tadema's
        desire for his work to be current and historically accurate.\"},{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">The key figure in this painting&rsquo;s narrative
        is Marcus Vipsanius Agrippa (63?\u201212 BC), general, statesman, architect
        and close friend to Augustus Caesar, who reigned as the first Roman Emperor
        from 27 BC. Agrippa moves up the stairs of his impressive villa and away from
        the petitioners making their requests below, and the objects assembled on
        the landing. The details of the image are painstakingly represented, from
        the dramatic fall of Agrippa&rsquo;s red cape, the wide expanses of marble,
        to the objects laid over the tiger skin. The crowd of people on the right
        demonstrate the artist&rsquo;s abilities in capturing variations of emotion.
        The sculpture of Augustus, which represents imperial power and authority,
        dominates the foreground. It was based on the now-celebrated &lsquo;Augustus
        of Prima Porta&rsquo;, which had only been rediscovered in 1863. This underscores
        Alma-Tadema&rsquo;s desire for his work to be current and historically accurate.</p><p
        class=\\\"dokuwiki_paragraph\\\">The arm of the statue gestures above the
        offerings and draws the viewer&rsquo;s eye to the atrium above where the soldiers,
        or servants, hold fasces. These were bundles of sticks bound together with
        an axe head protruding. It was a symbol of Ancient Rome that had survived
        into the modern world, as a representation of collective power, law, and governance.
        In the distance the visible blue sky indicates the open nature of the villa.</p><p
        class=\\\"dokuwiki_paragraph\\\">This painting was created to impress Sir
        William Armstrong, a wealthy Newcastle engineer and industrialist, who had
        admired Alma-Tadema&rsquo;s earlier work <span class=\\\"dokuwiki_italic\\\">An
        Audience with Agrippa</span> when it was exhibited to great acclaim at the
        Royal Academy in 1876. Rather than repeat the composition, the artist chose
        to represent the moment at the end of the &lsquo;audience&rsquo; with the
        figure of Agrippa walking up the stairs away from the landing, rather than
        towards it, as in the earlier painting. This later work is more complex and
        ambitious.</p><p class=\\\"dokuwiki_paragraph\\\">The painting was very well
        received when it was first exhibited at the Royal Scottish Academy in 1879.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long
        text\",\"value\":\"The key figure in this painting's narrative is Marcus Vipsanius
        Agrippa (63?\u201212 BC), general, statesman, architect and close friend to
        Augustus Caesar, who reigned as the first Roman Emperor from 27 BC. Agrippa
        moves up the stairs of his impressive villa and away from the petitioners
        making their requests below, and the objects assembled on the landing. The
        details of the image are painstakingly represented, from the dramatic fall
        of Agrippa's red cape, the wide expanses of marble, to the objects laid over
        the tiger skin. The crowd of people on the right demonstrate the artist's
        abilities in capturing variations of emotion. The sculpture of Augustus, which
        represents imperial power and authority, dominates the foreground. It was
        based on the now-celebrated 'Augustus of Prima Porta', which had only been
        rediscovered in 1863. This underscores Alma-Tadema's desire for his work to
        be current and historically accurate.The arm of the statue gestures above
        the offerings and draws the viewer's eye to the atrium above where the soldiers,
        or servants, hold fasces. These were bundles of sticks bound together with
        an axe head protruding. It was a symbol of Ancient Rome that had survived
        into the modern world, as a representation of collective power, law, and governance.
        In the distance the visible blue sky indicates the open nature of the villa.This
        painting was created to impress Sir William Armstrong, a wealthy Newcastle
        engineer and industrialist, who had admired Alma-Tadema's earlier work An
        Audience with Agrippa when it was exhibited to great acclaim at the Royal
        Academy in 1876. Rather than repeat the composition, the artist chose to represent
        the moment at the end of the 'audience' with the figure of Agrippa walking
        up the stairs away from the landing, rather than towards it, as in the earlier
        painting. This later work is more complex and ambitious.The painting was very
        well received when it was first exhibited at the Royal Scottish Academy in
        1879.\"},{\"formatted\":\"<p class=\\\"dokuwiki_paragraph\\\">The figure ascending
        the stairs is Marcus Vipsanius Agrippa (63?\u201212 BC): general, statesman,
        architect and close friend to Augustus Caesar, who reigned as the first Roman
        Emperor from 27 BC. Agrippa moves through his impressive villa, away from
        the figures making their requests, and the objects they have given, on the
        landing below. The details of the image are precisely represented, from the
        dramatic fall of Agrippa&rsquo;s red cape, the wide expanses of marble, to
        the objects laid over the tiger skin. The crowd of people on the right demonstrate
        the artist&rsquo;s abilities in capturing variations of emotion.</p><p class=\\\"dokuwiki_paragraph\\\">The
        sculpture of Augustus which represents imperial power and authority, dominates
        the foreground. It was based on the now-celebrated &lsquo;Augustus of Prima
        Porta&rsquo;, which had only been rediscovered in 1863. This underscores Alma-Tadema&rsquo;s
        desire for his work to be current and historically accurate.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short
        text\",\"value\":\"The figure ascending the stairs is Marcus Vipsanius Agrippa
        (63?\u201212 BC): general, statesman, architect and close friend to Augustus
        Caesar, who reigned as the first Roman Emperor from 27 BC. Agrippa moves through
        his impressive villa, away from the figures making their requests, and the
        objects they have given, on the landing below. The details of the image are
        precisely represented, from the dramatic fall of Agrippa's red cape, the wide
        expanses of marble, to the objects laid over the tiger skin. The crowd of
        people on the right demonstrate the artist's abilities in capturing variations
        of emotion.\\n\\nThe sculpture of Augustus which represents imperial power
        and authority, dominates the foreground. It was based on the now-celebrated
        'Augustus of Prima Porta', which had only been rediscovered in 1863. This
        underscores Alma-Tadema's desire for his work to be current and historically
        accurate.\"},{\"formatted\":\"<p class=\\\"dokuwiki_paragraph\\\">The key
        figure in this painting&rsquo;s narrative is Marcus Vipsanius Agrippa (63?\u201212
        BC), general, statesman, architect and close friend to Augustus Caesar, who
        reigned as the first Roman Emperor from 27 BC. Agrippa moves up the stairs
        of his impressive villa and away from the petitioners making their requests
        below, and the objects assembled on the landing. The details of the image
        are painstakingly represented, from the dramatic fall of Agrippa&rsquo;s red
        cape, the wide expanses of marble, to the objects laid over the tiger skin.
        The crowd of people on the right demonstrate the artist&rsquo;s abilities
        in capturing variations of emotion. The sculpture of Augustus, which represents
        imperial power and authority, dominates the foreground. It was based on the
        now-celebrated &lsquo;Augustus of Prima Porta&rsquo;, which had only been
        rediscovered in 1863. This underscores Alma-Tadema&rsquo;s desire for his
        work to be current and historically accurate.</p><p class=\\\"dokuwiki_paragraph\\\">The
        arm of the statue gestures above the offerings and draws the viewer&rsquo;s
        eye to the atrium above where the soldiers, or servants, hold fasces. These
        were bundles of sticks bound together with an axe head protruding. It was
        a symbol of Ancient Rome that had survived into the modern world, as a representation
        of collective power, law, and governance. In the distance the visible blue
        sky indicates the open nature of the villa.</p><p class=\\\"dokuwiki_paragraph\\\">This
        painting was created to impress Sir William Armstrong, a wealthy Newcastle
        engineer and industrialist, who had admired Alma-Tadema&rsquo;s earlier work
        <span class=\\\"dokuwiki_italic\\\">An Audience with Agrippa</span> when it
        was exhibited to great acclaim at the Royal Academy in 1876. Rather than repeat
        the composition, the artist chose to represent the moment at the end of the
        &lsquo;audience&rsquo; with the figure of Agrippa walking up the stairs away
        from the landing, rather than towards it, as in the earlier painting. This
        later work is more complex and ambitious.</p><p class=\\\"dokuwiki_paragraph\\\">The
        painting was very well received when it was first exhibited at the Royal Scottish
        Academy in 1879.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long text\",\"value\":\"The
        key figure in this painting's narrative is Marcus Vipsanius Agrippa (63?\u201212
        BC), general, statesman, architect and close friend to Augustus Caesar, who
        reigned as the first Roman Emperor from 27 BC. Agrippa moves up the stairs
        of his impressive villa and away from the petitioners making their requests
        below, and the objects assembled on the landing. The details of the image
        are painstakingly represented, from the dramatic fall of Agrippa's red cape,
        the wide expanses of marble, to the objects laid over the tiger skin. The
        crowd of people on the right demonstrate the artist's abilities in capturing
        variations of emotion. The sculpture of Augustus, which represents imperial
        power and authority, dominates the foreground. It was based on the now-celebrated
        'Augustus of Prima Porta', which had only been rediscovered in 1863. This
        underscores Alma-Tadema's desire for his work to be current and historically
        accurate.\\n\\nThe arm of the statue gestures above the offerings and draws
        the viewer's eye to the atrium above where the soldiers, or servants, hold
        fasces. These were bundles of sticks bound together with an axe head protruding.
        It was a symbol of Ancient Rome that had survived into the modern world, as
        a representation of collective power, law, and governance. In the distance
        the visible blue sky indicates the open nature of the villa.\\n\\nThis painting
        was created to impress Sir William Armstrong, a wealthy Newcastle engineer
        and industrialist, who had admired Alma-Tadema's earlier work An Audience
        with Agrippa when it was exhibited to great acclaim at the Royal Academy in
        1876. Rather than repeat the composition, the artist chose to represent the
        moment at the end of the 'audience' with the figure of Agrippa walking up
        the stairs away from the landing, rather than towards it, as in the earlier
        painting. This later work is more complex and ambitious.\\n\\nThe painting
        was very well received when it was first exhibited at the Royal Scottish Academy
        in 1879.\"}],\"accession\":{\"date\":[{\"from\":\"2024\",\"to\":\"2024\",\"value\":\"2024-05-30\"}],\"@entity\":\"lifecycle\"},\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
