        to 2028-04-23\"}],\"public_image\":true,\"download\":false,\"zoom\":true,\"hi_res\":false}},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"description\":[{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">Loosely painted in vibrant colours against
        a plain brown background, Monet carefully placed a still life of fruit on
        a tabletop covered with a crisp white tablecloth. In his still lifes of the
        1860&rsquo;s, the artist, like many of his contemporaries, took inspiration
        from the 18th-century artist Jean-Sim&eacute;on Chardin (1699-1779). Chardin
        was well-known for his modest still lifes of humble domestic objects set on
        a table or ledge. Monet would paint similar yet more dynamic compositions,
        carefully balancing the vibrant colours and dark shadows.</p><p class=\\\"dokuwiki_paragraph\\\">Monet
        possibly painted the work because still lifes were popular with Parisian dealers
        and collectors. The interest in Chardin had resurfaced in the early 1860&rsquo;s
        and so had the enthusiasm for his genre. Whether a strategic choice or the
        outcome of a rainy day staying inside, Monet&rsquo;s still lifes are a remarkable
        fusion of traditional genre and personal vision.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short
        text\",\"value\":\"Loosely painted in vibrant colours against a plain brown
        background, Monet carefully placed a still life of fruit on a tabletop covered
        with a crisp white tablecloth. In his still lifes of the 1860\u2019s, the
        artist, like many of his contemporaries, took inspiration from the 18th-century
        artist Jean-Sim\xE9on Chardin (1699-1779). Chardin was well-known for his
        modest still lifes of humble domestic objects set on a table or ledge. Monet
        would paint similar yet more dynamic compositions, carefully balancing the
        vibrant colours and dark shadows.\\n\\nMonet possibly painted the work because
        still lifes were popular with Parisian dealers and collectors. The interest
        in Chardin had resurfaced in the early 1860\u2019s and so had the enthusiasm
        for his genre. Whether a strategic choice or the outcome of a rainy day staying
        inside, Monet\u2019s still lifes are a remarkable fusion of traditional genre
        and personal vision.\"},{\"formatted\":\"<p class=\\\"dokuwiki_paragraph\\\">Loosely
        painted in vibrant colours against a plain brown background, a still life
        of fruit is set on a tabletop covered with a crisp white tablecloth. <a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0PPQ-0001-0000-0000.htm\\\">Monet</a> places
        two brightly coloured apples in the foreground, one red and the other red
        and green, shimmering with touches of white paint. In the wicker basket lined
        with vine leaves, four pears are meticulously stacked. A fifth stands to the
        left, partly behind three bunches of plump grapes. Monet carefully places
        a source of light to the left of the composition, as the shadows of both apples
        and pears fall sharply to the right.</p><p class=\\\"dokuwiki_paragraph\\\">The
        work was painted in 1867 when Monet was 27 years old. Like his contemporaries
        <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0QBW-0001-0000-0000.htm\\\">Edouard
        Manet</a> and <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0P84-0001-0000-0000.htm\\\">Paul
        Cezanne</a>, in his early works Monet took inspiration from the 18th-century
        artist <a class=\\\"dokuwiki_link\\\" href=\\\"{$BASE_URL}/chardin_jean-simeon\\\">Jean-Sim&eacute;on
        Chardin</a> (1699-1779). Rediscovered in the 1860&rsquo;s, Chardin was greatly
        admired for his modest still lifes consisting of humble domestic objects such
        as fruit, poultry, pots and kitchen utensils, placed on a table or ledge.
        Like Chardin, Monet would depict homely objects, but unlike that artist he
        would often depict his still lifes on top of white table linen. This simple
        cloth was possibly inspired by Manet&rsquo;s still lifes of the 1860&rsquo;s,
        in which he also included draped linen. Where Chardin&rsquo;s still lifes
        are austerely arranged, Monet would intricately stage the fruits to create
        a dynamic composition. Here, the triangular pile of pears is placed strategically
        in the wicker basket, adding a diagonal line to the otherwise horizontal arrangement.
        In addition, the artist also carefully balances the variety of colours, contrasting
        the red and green apple with the yellow pears and multi-coloured grapes.</p><p
        class=\\\"dokuwiki_paragraph\\\">But why would Monet choose to paint a still
        life at a time when he was also working on more complex group portraits and
        vibrant seascapes? It is possible that he did so because they were a genre
        popular with dealers and collectors. In the same year, his submissions to
        the influential Paris Salon were rejected. Possibly, to conform with the more
        conservative trajectory of the Salon jury and Parisian collectors, Monet chose
        a subject and style he knew would be appreciated. Another possibility is that
        the work was painted simply on a rainy day, when the artist couldn&rsquo;t
        go outside. After all, for most of 1867, Monet was living in Saint-Adresse
        on the Normandy coast, where wet summers are no exception. Whether a strategic
        choice or the result of bad weather, Monet&rsquo;s still lifes are a remarkable
        fusion of traditional genre and personal vision.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long
        text\",\"value\":\"Loosely painted in vibrant colours against a plain brown
        background, a still life of fruit is set on a tabletop covered with a crisp
        white tablecloth. Monet places two brightly coloured apples in the foreground,
        one red and the other red and green, shimmering with touches of white paint.
        In the wicker basket lined with vine leaves, four pears are meticulously stacked.
        A fifth stands to the left, partly behind three bunches of plump grapes. Monet
        carefully places a source of light to the left of the composition, as the
        shadows of both apples and pears fall sharply to the right.\\n\\nThe work
        was painted in 1867 when Monet was 27 years old. Like his contemporaries Edouard
        Manet and Paul Cezanne, in his early works Monet took inspiration from the
        18th-century artist Jean-Sim\xE9on Chardin (1699-1779). Rediscovered in the
        1860\u2019s, Chardin was greatly admired for his modest still lifes consisting
        of humble domestic objects such as fruit, poultry, pots and kitchen utensils,
        placed on a table or ledge. Like Chardin, Monet would depict homely objects,
        but unlike that artist he would often depict his still lifes on top of white
        table linen. This simple cloth was possibly inspired by Manet\u2019s still
        lifes of the 1860\u2019s, in which he also included draped linen. Where Chardin\u2019s
        still lifes are austerely arranged, Monet would intricately stage the fruits
        to create a dynamic composition. Here, the triangular pile of pears is placed
        strategically in the wicker basket, adding a diagonal line to the otherwise
        horizontal arrangement. In addition, the artist also carefully balances the
        variety of colours, contrasting the red and green apple with the yellow pears
        and multi-coloured grapes.\\n\\nBut why would Monet choose to paint a still
        life at a time when he was also working on more complex group portraits and
        vibrant seascapes? It is possible that he did so because they were a genre
        popular with dealers and collectors. In the same year, his submissions to
        the influential Paris Salon were rejected. Possibly, to conform with the more
        conservative trajectory of the Salon jury and Parisian collectors, Monet chose
        a subject and style he knew would be appreciated. Another possibility is that
        the work was painted simply on a rainy day, when the artist couldn\u2019t
        go outside. After all, for most of 1867, Monet was living in Saint-Adresse
        on the Normandy coast, where wet summers are no exception. Whether a strategic
        choice or the result of bad weather, Monet\u2019s still lifes are a remarkable
        fusion of traditional genre and personal vision.\"}],\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
