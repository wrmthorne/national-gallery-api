        signed by his Haarlem colleague Claes van Heussen, who rendered the market
        stall laden with fruit and vegetables. Hals painted the young woman holding
        a pair of scales. Caught in the moment as she reaches for something, she playfully
        catches our eye. Van Heussen&rsquo;s delicate paint application stands in
        stark contrast to Hals&rsquo;s expressive brushwork.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short
