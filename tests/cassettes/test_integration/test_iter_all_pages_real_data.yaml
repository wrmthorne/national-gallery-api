        class=\\\"dokuwiki_paragraph\\\">Edward Gardiner was Gainsborough&rsquo;s
        nephew, and recorded to have spent time in his studio. He is depicted in this
        portrait at the age of around eight or nine. It is thought that the painting
        was created as a pendant to a portrait of the sitter&rsquo;s sister Susan,
        at the same age.</p><p class=\\\"dokuwiki_paragraph\\\">The portrait of Edward
        reflects the influence of the Flemish portraitist Anthony van Dyck (1599-1641)
        in the loose brushwork and the style of finish. The child appears to be wearing
        the same pale blue costume as the sitter in Gainsborough&rsquo;s painting
        <span class=\\\"dokuwiki_italic\\\">The Blue Boy</span> (Huntington Collection,
        California), suggesting that this may have been a prop in the artist&rsquo;s
        studio. This use of historic costume also makes reference to the work of Van
        Dyck whose work Gainsborough admired. Gainsborough&rsquo;s emulation of great
        artists in his later work reflects growing confidence in his own abilities.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short
        text\",\"value\":\"Edward Gardiner was Gainsborough's nephew, and recorded
        to have spent time in his studio. He is depicted in this portrait at the age
        of around eight or nine. It is thought that the painting was created as a
        pendant to a portrait of the sitter\u2019s sister Susan, at the same age.\\n\\nThe
        portrait of Edward reflects the influence of the Flemish portraitist Anthony
        van Dyck (1599-1641) in the loose brushwork and the style of finish. The child
        appears to be wearing the same pale blue costume as the sitter in Gainsborough\u2019s
        painting The Blue Boy (Huntington Collection, California), suggesting that
        this may have been a prop in the artist\u2019s studio. This use of historic
        costume also makes reference to the work of Van Dyck whose work Gainsborough
        admired. Gainsborough\u2019s emulation of great artists in his later work
        reflects growing confidence in his own abilities.\"},{\"formatted\":\"<p class=\\\"dokuwiki_paragraph\\\">Edward
        Gardiner was <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0PFP-0001-0000-0000.htm\\\">Gainsborough&rsquo;s</a>
        nephew, and recorded to have spent time in his studio. He is depicted in this
        portrait at the age of around eight or nine. It is thought that the painting
        was created as a pendant to a portrait of the sitter&rsquo;s sister Susan,
        at the same age.</p><p class=\\\"dokuwiki_paragraph\\\">The portrait of Edward
        reflects the influence of the Flemish portraitist <a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0PEJ-0001-0000-0000.htm\\\">Anthony van Dyck
        (1599-1641)</a> in the loose brushwork and the style of finish. The child
        appears to be wearing the same pale blue costume as the sitter in Gainsborough&rsquo;s
        painting <span class=\\\"dokuwiki_italic\\\">The Blue Boy</span> (Huntington
        Collection, California), suggesting that this may have been a prop in the
        artist&rsquo;s studio. This use of historic costume also makes reference to
        the work of Van Dyck whose work Gainsborough admired. Gainsborough&rsquo;s
        emulation of great artists in his later work reflects growing confidence in
        his own abilities.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long text\",\"value\":\"Edward
        Gardiner was Gainsborough's nephew, and recorded to have spent time in his
        studio. He is depicted in this portrait at the age of around eight or nine.
        It is thought that the painting was created as a pendant to a portrait of
        the sitter\u2019s sister Susan, at the same age.\\n\\nThe portrait of Edward
        reflects the influence of the Flemish portraitist Anthony van Dyck (1599-1641)
        in the loose brushwork and the style of finish. The child appears to be wearing
        the same pale blue costume as the sitter in Gainsborough\u2019s painting The
        Blue Boy (Huntington Collection, California), suggesting that this may have
        been a prop in the artist\u2019s studio. This use of historic costume also
        makes reference to the work of Van Dyck whose work Gainsborough admired. Gainsborough\u2019s
        emulation of great artists in his later work reflects growing confidence in
        his own abilities.\"}],\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
