        class=\\\"dokuwiki_paragraph\\\">This portrait is a sensitive representation
        of the studio assistant who would &lsquo;carry the artist&rsquo;s materials
        when he went into the country to sketch&rsquo;. His name is not recorded,
        but this painting has been named after the child&rsquo;s home village in Somerset.
        The loose handling of the paint and unfinished nature suggest it was executed
        quite quickly and reflects the intimate relationship the Gainsborough had
        with the subject, as a member of his household. The artist was experimenting
        freely with pose and expression. The painting follows the Dutch tradition
        of the <span class=\\\"dokuwiki_italic\\\">tronie</span>, in which a figure
        is painted to explore character, rather than as the portrait of an individual.
        This places the emphasis on capturing the expression on the young boy&rsquo;s
        face.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short text\",\"value\":\"This
        portrait is a sensitive representation of the studio assistant who would \u2018carry
        the artist\u2019s materials when he went into the country to sketch\u2019.
        His name is not recorded, but this painting has been named after the child\u2019s
        home village in Somerset. The loose handling of the paint and unfinished nature
        suggest it was executed quite quickly and reflects the intimate relationship
        the Gainsborough had with the subject, as a member of his household. The artist
        was experimenting freely with pose and expression. The painting follows the
        Dutch tradition of the tronie, in which a figure is painted to explore character,
        rather than as the portrait of an individual. This places the emphasis on
        capturing the expression on the young boy\u2019s face.\"},{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">This portrait is a sensitive representation
        of the studio assistant who would &lsquo;carry the artist&rsquo;s materials
        when he went into the country to sketch&rsquo;. His name is not recorded,
        but this painting has been named after the child&rsquo;s home village in Somerset.
        The loose handling of the paint and unfinished nature suggest it was executed
        quite quickly and reflects the intimate relationship the Gainsborough had
        with the subject, as a member of his household. The artist was experimenting
        freely with pose and expression. The painting follows the Dutch tradition
        of the <span class=\\\"dokuwiki_italic\\\">tronie</span>, in which a figure
        is painted to explore character, rather than as the portrait of an individual.
        This places the emphasis on capturing the expression on the young boy&rsquo;s
        face.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long text\",\"value\":\"This
        portrait is a sensitive representation of the studio assistant who would \u2018carry
        the artist\u2019s materials when he went into the country to sketch\u2019.
        His name is not recorded, but this painting has been named after the child\u2019s
        home village in Somerset. The loose handling of the paint and unfinished nature
        suggest it was executed quite quickly and reflects the intimate relationship
        the Gainsborough had with the subject, as a member of his household. The artist
        was experimenting freely with pose and expression. The painting follows the
        Dutch tradition of the tronie, in which a figure is painted to explore character,
        rather than as the portrait of an individual. This places the emphasis on
        capturing the expression on the young boy\u2019s face.\"}],\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
