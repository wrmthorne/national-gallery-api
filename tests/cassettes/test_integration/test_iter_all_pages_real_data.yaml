        - present\"}],\"note\":[],\"role\":[{\"value\":\"Current framing\"}]},\"@admin\":{\"uid\":\"0EA3-0009-0000-0000\",\"id\":\"object-20396\",\"uuid\":\"eab9c1ee-e738-382c-ad53-e3ddec3d07e3\"},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"@entity\":\"reference\"}]},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"description\":[{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">This portrait of Charles William Lambton
        - aged six or seven - was commissioned by the boy&rsquo;s father John George
        Lambton, 1st Earl of Durham, a Whig politician and MP for County Durham. Popularly
        known as <span class=\\\"dokuwiki_italic\\\">The Red Boy</span>, it remained
        in the Lambton family until it was acquired by the National Gallery in 2021.
        It is acknowledged as one of Thomas Lawrence&rsquo;s masterpieces and, a sign
        of the image&rsquo;s enduring popularity, it was the first painting to be
        reproduced on a British postage stamp in 1967.</p><p class=\\\"dokuwiki_paragraph\\\">Sitting
        on a promontory overlooking a moonlit sea, Lawrence portrays Lambton as a
        child wanderer, lost in contemplation of the sublime power of nature. The
        flowers opening next to him symbolise his young age. He is at the beginning
        of his journey through life, though this was cut short - he died of tuberculosis
        aged only thirteen. Lawrence may have been inspired by the work of Lord Byron
        or by William Wordsworth&rsquo;s poem <span class=\\\"dokuwiki_italic\\\">There
        was a Boy</span> (1798).</p><p class=\\\"dokuwiki_paragraph\\\">Unlike Gainsborough&rsquo;s
        famous portrait, <span class=\\\"dokuwiki_italic\\\">The Blue Boy</span> (1770,
        The Huntington Art Museum, San Marino) who wears a seventeenth-century &lsquo;Van
        Dyck&rsquo; costume, <span class=\\\"dokuwiki_italic\\\">The Red Boy</span>
        is dressed in the contemporary children&rsquo;s fashion of loose-fitting clothes.
        Several of Lawrence&rsquo;s young sitters wear these red velvet &lsquo;skeleton
        suits&rsquo; which were roomier and better for playing outdoors and which,
        by 1800, had replaced Van Dyck dress for children of wealthy families.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short
        text\",\"value\":\"This portrait of Charles William Lambton - aged six or
        seven - was commissioned by the boy's father John George Lambton, 1st Earl
        of Durham, a Whig politician and MP for County Durham. Popularly known as
        The Red Boy, it remained in the Lambton family until it was acquired by the
        National Gallery in 2021. It is acknowledged as one of Thomas Lawrence\u2019s
        masterpieces and, a sign of the image\u2019s enduring popularity, it was the
        first painting to be reproduced on a British postage stamp in 1967.\\n\\nSitting
        on a promontory overlooking a moonlit sea, Lawrence portrays Lambton as a
        child wanderer, lost in contemplation of the sublime power of nature. The
        flowers opening next to him symbolise his young age. He is at the beginning
        of his journey through life, though this was cut short - he died of tuberculosis
        aged only thirteen. Lawrence may have been inspired by the work of Lord Byron
        or by William Wordsworth\u2019s poem There was a Boy (1798).\\n\\nUnlike Gainsborough\u2019s
        famous portrait, The Blue Boy (1770, The Huntington Art Museum, San Marino)
        who wears a seventeenth-century \u2018Van Dyck\u2019 costume, The Red Boy
        is dressed in the contemporary children's fashion of loose-fitting clothes.
        Several of Lawrence\u2019s young sitters wear these red velvet \u2018skeleton
        suits\u2019 which were roomier and better for playing outdoors and which,
        by 1800, had replaced Van Dyck dress for children of wealthy families.\"},{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">This portrait of Charles William Lambton
        - aged six or seven - was commissioned by the boy&rsquo;s father John George
        Lambton, 1st Earl of Durham, a Whig politician and MP for County Durham. Popularly
        known as <span class=\\\"dokuwiki_italic\\\">The Red Boy</span>, it stayed
        in the Lambton family until it was acquired by the National Gallery in 2021.
        It is acknowledged as one of <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0Q0H-0001-0000-0000.htm\\\">Thomas
        Lawrence&rsquo;s</a> masterpieces and, a sign of the image&rsquo;s enduring
        popularity, it was the first painting to be reproduced on a British postage
        stamp in 1967.</p><p class=\\\"dokuwiki_paragraph\\\">Lawrence was one of
        Europe&rsquo;s finest portrait artists of the late eighteenth and early nineteenth
        centuries and created some of the most memorable images of <a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0F4M-0008-0000-0000.htm\\\">Romantic</a> art.
        In 1792, he was made Painter in Ordinary to King George III, and, with his
        knighthood in 1815 and appointment as President of the Royal Academy from
        1820, Lawrence went on to become the unchallenged heir to the British portrait
        painters, <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0PFP-0001-0000-0000.htm\\\">Thomas
        Gainsborough</a> and <a class=\\\"dokuwiki_link\\\" href=\\\"https://data.ng.ac.uk/0QEE-0001-0000-0000.htm\\\">Joshua
        Reynolds</a>, and the revered seventeenth-century Flemish artist, <a class=\\\"dokuwiki_link\\\"
        href=\\\"https://data.ng.ac.uk/0PEJ-0001-0000-0000.htm\\\">Anthony van Dyck</a>.
        Like them, he gained a lasting reputation for sensitive portraits of children
        and young adults. When <span class=\\\"dokuwiki_italic\\\">The Red Boy</span>
        was first exhibited at the Royal Academy in 1825, critics commented that the
        painting even exceeded Reynolds&rsquo; reputation in the field, with its &lsquo;simple
        action and sweet expression of infantile nature&rsquo;. Lawrence may have
        been inspired by the works of Lord Bryon and by William Wordsworth&rsquo;s
        poem <span class=\\\"dokuwiki_italic\\\">There was a Boy</span> (1798), or
        it may allude to one of Lawrence&rsquo;s own poems: &lsquo;Proceed, dear boy,
        and climb the hill,/ Enjoy the morning of thy time/ And all the rocks of future
        life/ As cheerful and as active climb.&rsquo;</p><p class=\\\"dokuwiki_paragraph\\\">Sitting
        on a promontory overlooking a moonlit sea, Lawrence portrays Lambton as a
        child wanderer, lost in contemplation of the sublime power of nature. The
        flowers opening at his side symbolise his young age. He is at the beginning
        of his journey through life, though this was cut short - he died of tuberculosis
        aged only thirteen. The poetic references of <span class=\\\"dokuwiki_italic\\\">The
        Red Boy</span> were picked up by people who saw the painting when it was exhibited
        at the Paris Salon of 1827. About thirty years later the French art critic
        Th&eacute;ophile Gautier spoke of Lambton&rsquo;s &lsquo;pearly visage so
        sombre and clear it conjures the look of the young Byron; that precocious
        dreamer astonished many Parisians.&rsquo;</p><p class=\\\"dokuwiki_paragraph\\\">The
        painting&rsquo;s nickname, &lsquo;The Red Boy&rsquo;, reflects the trend during
        the nineteenth and early twentieth centuries to give portraits of children
        titles that included the painting&rsquo;s dominant colour. The most famous
        example of this is Gainsborough&rsquo;s <span class=\\\"dokuwiki_italic\\\">The
        Blue Boy</span> of 1770 (The Huntington Art Museum, San Marino) which is now
        thought to be a portrait of the artist&rsquo;s nephew, Gainsborough Dupont.
        Lawrence&rsquo;s early portrait of Sarah Goodin Moulton (1794, The Huntington
        Art Museum, San Marino) has long been known as &lsquo;Pinkie&rsquo;, her family
        nickname. After the sale of <span class=\\\"dokuwiki_italic\\\">The Blue Boy</span>
        in 1922, the Illustrated London News published reproductions of &lsquo;Sir
        Thomas Lawrence&rsquo;s equally charming portrait which we have named &lsquo;The
        Red Boy&rsquo;&rsquo;. Lawrence&rsquo;s portrait attracted further attention
        thanks to a popular story that Lambton&rsquo;s clothes had originally been
        painted yellow. Unlike Gainsborough&rsquo;s sitter, who wears a seventeenth-century
        &lsquo;Van Dyck&rsquo; costume, <span class=\\\"dokuwiki_italic\\\">The Red
        Boy</span> is dressed in loose-fitting clothes; the contemporary fashion for
        children. Several of Lawrence&rsquo;s young sitters wear these red velvet
        &lsquo;skeleton suits&rsquo; which were roomier and better for playing outdoors
        and which, by 1800, had replaced Van Dyck dress for the children of wealthy
        families.</p><p class=\\\"dokuwiki_paragraph\\\">The gilded frame is original
        to the painting and was selected by Lawrence from the frame maker George Morant.
        This type of frame is often referred to as a Morant frame or a Lawrence frame.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long
        text\",\"value\":\"This portrait of Charles William Lambton - aged six or
        seven - was commissioned by the boy's father John George Lambton, 1st Earl
        of Durham, a Whig politician and MP for County Durham. Popularly known as
        The Red Boy, it stayed in the Lambton family until it was acquired by the
        National Gallery in 2021. It is acknowledged as one of Thomas Lawrence\u2019s
        masterpieces and, a sign of the image\u2019s enduring popularity, it was the
        first painting to be reproduced on a British postage stamp in 1967.\\n\\nLawrence
        was one of Europe\u2019s finest portrait artists of the late eighteenth and
        early nineteenth centuries and created some of the most memorable images of
        Romantic art. In 1792, he was made Painter in Ordinary to King George III,
        and, with his knighthood in 1815 and appointment as President of the Royal
        Academy from 1820, Lawrence went on to become the unchallenged heir to the
        British portrait painters, Thomas Gainsborough and Joshua Reynolds, and the
        revered seventeenth-century Flemish artist, Anthony van Dyck. Like them, he
        gained a lasting reputation for sensitive portraits of children and young
        adults. When The Red Boy was first exhibited at the Royal Academy in 1825,
        critics commented that the painting even exceeded Reynolds\u2019 reputation
        in the field, with its \u2018simple action and sweet expression of infantile
        nature\u2019. Lawrence may have been inspired by the works of Lord Bryon and
        by William Wordsworth\u2019s poem There was a Boy (1798), or it may allude
        to one of Lawrence\u2019s own poems: \u2018Proceed, dear boy, and climb the
        hill,/ Enjoy the morning of thy time/ And all the rocks of future life/ As
        cheerful and as active climb.\u2019\\n\\nSitting on a promontory overlooking
        a moonlit sea, Lawrence portrays Lambton as a child wanderer, lost in contemplation
        of the sublime power of nature. The flowers opening at his side symbolise
        his young age. He is at the beginning of his journey through life, though
        this was cut short - he died of tuberculosis aged only thirteen. The poetic
        references of The Red Boy were picked up by people who saw the painting when
        it was exhibited at the Paris Salon of 1827. About thirty years later the
        French art critic Th\xE9ophile Gautier spoke of Lambton\u2019s \u2018pearly
        visage so sombre and clear it conjures the look of the young Byron; that precocious
        dreamer astonished many Parisians.\u2019\\n\\nThe painting\u2019s nickname,
        'The Red Boy', reflects the trend during the nineteenth and early twentieth
        centuries to give portraits of children titles that included the painting's
        dominant colour. The most famous example of this is Gainsborough\u2019s The
        Blue Boy of 1770 (The Huntington Art Museum, San Marino) which is now thought
        to be a portrait of the artist\u2019s nephew, Gainsborough Dupont. Lawrence\u2019s
        early portrait of Sarah Goodin Moulton (1794, The Huntington Art Museum, San
        Marino) has long been known as 'Pinkie', her family nickname. After the sale
        of The Blue Boy in 1922, the Illustrated London News published reproductions
        of \u2018Sir Thomas Lawrence\u2019s equally charming portrait which we have
        named 'The Red Boy'\u2019. Lawrence\u2019s portrait attracted further attention
        thanks to a popular story that Lambton\u2019s clothes had originally been
        painted yellow. Unlike Gainsborough\u2019s sitter, who wears a seventeenth-century
        \u2018Van Dyck\u2019 costume, The Red Boy is dressed in loose-fitting clothes;
        the contemporary fashion for children. Several of Lawrence\u2019s young sitters
        wear these red velvet \u2018skeleton suits\u2019 which were roomier and better
        for playing outdoors and which, by 1800, had replaced Van Dyck dress for the
        children of wealthy families.\\n\\nThe gilded frame is original to the painting
        and was selected by Lawrence from the frame maker George Morant. This type
        of frame is often referred to as a Morant frame or a Lawrence frame.\"}],\"accession\":{\"date\":[{\"from\":\"2021\",\"to\":\"2021\",\"value\":\"2021-10-11\"}],\"@entity\":\"lifecycle\"},\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
