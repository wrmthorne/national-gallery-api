        Broere Charitable Foundation\",\"hi_res\":false}},\"framing\":{\"glazing\":{\"type\":\"Optium
        acrylic\"}},\"@datatype\":{\"virtual\":false,\"base\":\"object\"},\"description\":[{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">In the mid-1920s, Picabia began a series
        of paintings known as &lsquo;Transparencies&rsquo;. In these esoteric, dreamlike
        compositions, the artist layers images from an eclectic array of sources.
        Picabia painted <span class=\\\"dokuwiki_italic\\\">Salome</span> in the middle
        of this period. The story of Salome itself is biblical: the stepdaughter of
        King Herod, Salome demands the head of Saint John the Baptist on a platter
        and dances in exchange for her wish. Her lithe figure in Picabia&rsquo;s painting
        derives from a 1925 photograph of a ballet dancer, taken by the Austrian photographer
        Trude Fleischmann, while the oversized face was probably based on Botticelli&rsquo;s
        <span class=\\\"dokuwiki_italic\\\">Christ the Redeemer</span> (about 1495&ndash;1505,
        Accademia Carrara, Bergamo). The effect of the painting is akin to that of
        collage &ndash; a key tool of the Dadaists, with whom Picabia was associated
        in the early 1920s.</p><p class=\\\"dokuwiki_paragraph\\\">Picabia&rsquo;s
        juxtapositions are anti-systematic, driven by idiosyncratic, intuitive association:
        for the artist, the &lsquo;Transparencies&rsquo; express &lsquo;the resemblance
        of my interior desires&rsquo;. Although the medium of <span class=\\\"dokuwiki_italic\\\">Salome</span>
        is oil paint, it bears a remarkable filmy quality, which Picabia achieved
        by using thin washes, applying varnish to create layers, and effacing and
        repainting parts of the canvas. He also painted the work with a distinct patina,
        imitating the sepia-toned veneer of a work discoloured by age. Picabia, who
        was notoriously capricious with his pictorial methods, abandoned the &lsquo;Transparencies&rsquo;
        in 1932.</p>\",\"source\":\"Dokuwiki\",\"type\":\"short text\",\"value\":\"In
        the mid-1920s, Picabia began a series of paintings known as \u2018Transparencies\u2019.
        In these esoteric, dreamlike compositions, the artist layers images from an
        eclectic array of sources. Picabia painted Salome in the middle of this period.
        The story of Salome itself is biblical: the stepdaughter of King Herod, Salome
        demands the head of Saint John the Baptist on a platter and dances in exchange
        for her wish. Her lithe figure in Picabia\u2019s painting derives from a 1925
        photograph of a ballet dancer, taken by the Austrian photographer Trude Fleischmann,
        while the oversized face was probably based on Botticelli\u2019s Christ the
        Redeemer (about 1495\u20131505, Accademia Carrara, Bergamo). The effect of
        the painting is akin to that of collage \u2013 a key tool of the Dadaists,
        with whom Picabia was associated in the early 1920s.\\n\\nPicabia\u2019s juxtapositions
        are anti-systematic, driven by idiosyncratic, intuitive association: for the
        artist, the 'Transparencies' express \u2018the resemblance of my interior
        desires\u2019. Although the medium of Salome is oil paint, it bears a remarkable
        filmy quality, which Picabia achieved by using thin washes, applying varnish
        to create layers, and effacing and repainting parts of the canvas. He also
        painted the work with a distinct patina, imitating the sepia-toned veneer
        of a work discoloured by age. Picabia, who was notoriously capricious with
        his pictorial methods, abandoned the 'Transparencies' in 1932.\"},{\"formatted\":\"<p
        class=\\\"dokuwiki_paragraph\\\">In the mid-1920s, after his break with the
        Dada and Surrealist movements, Picabia began a series of paintings known as
        &lsquo;Transparencies&rsquo;. In these esoteric, dreamlike compositions, Picabia
        layers fragments from an eclectic array of sources &ndash; classical myth,
        medieval Catalan frescoes, Old Master paintings and contemporary photography
        &ndash; to give the impression of disparate images superimposed upon each
        other.</p><p class=\\\"dokuwiki_paragraph\\\">Picabia painted <span class=\\\"dokuwiki_italic\\\">Salome</span>,
        a work dense with quotation, in the middle of this period. The story of Salome
        itself is biblical: the stepdaughter of King Herod, Salome demands the head
        of Saint John the Baptist on a platter and dances in exchange for her wish,
        becoming a cultural icon of seductive female power. Her lithe figure in Picabia&rsquo;s
        painting derives from a 1925 photograph of a ballet dancer, Claire Baruoff,
        taken by Austrian photographer Trude Fleischmann, while the oversized face
        was probably based on Botticelli&rsquo;s <span class=\\\"dokuwiki_italic\\\">Christ
        the Redeemer</span> (about 1495&ndash;1505, Accademia Carrara, Bergamo), in
        which a thorned and tearful Christ raises his hand in blessing. Rather than
        copying from original works, Picabia took from reproductions, much as he had
        previously made tracings of figures instead of painting models directly. The
        effect of this process is akin to that of collage &ndash; a key tool of the
        Dadaists, who valued the improvised and unexpected collision of disconnected
        images.</p><p class=\\\"dokuwiki_paragraph\\\">Despite their well-established
        reference points, the &lsquo;Transparencies&rsquo; are full of a personal,
        hermetic codes which resist conventional interpretation. Picabia&rsquo;s juxtapositions
        are anti-systematic, driven less by clear reasoning than intuitive association.
        For the artist, the works express &lsquo;the resemblance of my interior desires,&rsquo;
        the outcome of an ambition to produce paintings &lsquo;where all my instincts
        have a free course.&rsquo; Such is the alchemical logic of the &lsquo;Transparencies&rsquo;
        that they often produce an occult, hallucinatory result. Yet the theme of
        desire does appear to be central in <span class=\\\"dokuwiki_italic\\\">Salome</span>:
        alongside Salome&rsquo;s nude figure, the heavy-lidded eyes and half-parted
        lips of Picabia&rsquo;s androgynous riff on Botticelli&rsquo;s Christ imply
        a latent sensuality.</p><p class=\\\"dokuwiki_paragraph\\\">Picabia simplifies
        the forms of these overlapping images, painting in a graphic style with strong,
        sinuous lines. The &lsquo;Transparencies&rsquo;&rsquo; lack of recessional
        space, and their simultaneity of different images, led Marcel Duchamp to note
        that these works produce &lsquo;a third dimension without resorting to perspective.&rsquo;
        Although the medium of <span class=\\\"dokuwiki_italic\\\">Salome</span> is
        oil paint, it bears a remarkable filmy quality, which Picabia achieved by
        using thin washes, applying varnish to create layers, and effacing and repainting
        parts of the canvas. In keeping with his highly modern &ndash; even proto-postmodern
        &ndash; aesthetic strategies, the artist also painted Salome with a distinct
        patina, imitating the sepia-toned veneer of a work discoloured by age. Such
        self-reflexivity &ndash; painting not only versions of other paintings, but
        also pastiching their material surfaces &ndash; marks <span class=\\\"dokuwiki_italic\\\">Salome</span>
        as an intellectual work as much as it is a phantasmagorical one.</p><p class=\\\"dokuwiki_paragraph\\\">Picabia,
        who was notoriously capricious with his pictorial methods, abandoned the &lsquo;Transparencies&rsquo;
        only a few years later in 1932.</p>\",\"source\":\"Dokuwiki\",\"type\":\"long
        text\",\"value\":\"In the mid-1920s, after his break with the Dada and Surrealist
        movements, Picabia began a series of paintings known as \u2018Transparencies\u2019.
        In these esoteric, dreamlike compositions, Picabia layers fragments from an
        eclectic array of sources \u2013 classical myth, medieval Catalan frescoes,
        Old Master paintings and contemporary photography \u2013 to give the impression
        of disparate images superimposed upon each other.\\n\\nPicabia painted Salome,
        a work dense with quotation, in the middle of this period. The story of Salome
        itself is biblical: the stepdaughter of King Herod, Salome demands the head
        of Saint John the Baptist on a platter and dances in exchange for her wish,
        becoming a cultural icon of seductive female power. Her lithe figure in Picabia\u2019s
        painting derives from a 1925 photograph of a ballet dancer, Claire Baruoff,
        taken by Austrian photographer Trude Fleischmann, while the oversized face
        was probably based on Botticelli\u2019s Christ the Redeemer (about 1495\u20131505,
        Accademia Carrara, Bergamo), in which a thorned and tearful Christ raises
        his hand in blessing. Rather than copying from original works, Picabia took
        from reproductions, much as he had previously made tracings of figures instead
        of painting models directly. The effect of this process is akin to that of
        collage \u2013 a key tool of the Dadaists, who valued the improvised and unexpected
        collision of disconnected images.\\n\\nDespite their well-established reference
        points, the 'Transparencies' are full of a personal, hermetic codes which
        resist conventional interpretation. Picabia\u2019s juxtapositions are anti-systematic,
        driven less by clear reasoning than intuitive association. For the artist,
        the works express \u2018the resemblance of my interior desires,\u2019 the
        outcome of an ambition to produce paintings \u2018where all my instincts have
        a free course.\u2019 Such is the alchemical logic of the 'Transparencies'
        that they often produce an occult, hallucinatory result. Yet the theme of
        desire does appear to be central in Salome: alongside Salome\u2019s nude figure,
        the heavy-lidded eyes and half-parted lips of Picabia\u2019s androgynous riff
        on Botticelli\u2019s Christ imply a latent sensuality.\\n\\nPicabia simplifies
        the forms of these overlapping images, painting in a graphic style with strong,
        sinuous lines. The 'Transparencies\u2019' lack of recessional space, and their
        simultaneity of different images, led Marcel Duchamp to note that these works
        produce \u2018a third dimension without resorting to perspective.\u2019 Although
        the medium of Salome is oil paint, it bears a remarkable filmy quality, which
        Picabia achieved by using thin washes, applying varnish to create layers,
        and effacing and repainting parts of the canvas. In keeping with his highly
        modern \u2013 even proto-postmodern \u2013 aesthetic strategies, the artist
        also painted Salome with a distinct patina, imitating the sepia-toned veneer
        of a work discoloured by age. Such self-reflexivity \u2013 painting not only
        versions of other paintings, but also pastiching their material surfaces \u2013
        marks Salome as an intellectual work as much as it is a phantasmagorical one.\\n\\nPicabia,
        who was notoriously capricious with his pictorial methods, abandoned the 'Transparencies'
        only a few years later in 1932.\"}],\"classification\":[{\"equivalents\":[{\"summary\":{\"title\":\"Picture\"},\"identifier\":[{\"id\":\"https://vocab.getty.edu/aat/300264388\",\"type\":\"AAT\",\"value\":\"pictures
