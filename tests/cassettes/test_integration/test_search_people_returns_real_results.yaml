        11:24:14\",\"author\":{\"summary\":{\"title\":\"The National Gallery (London)\"},\"@admin\":{\"uid\":\"0P5X-0001-0000-0000\",\"id\":\"agent-652\",\"uuid\":\"511c84f0-a664-39ab-b653-6db7fc6c345e\"},\"@datatype\":{\"actual\":\"Organisation\",\"equivalents\":[{\"@admin\":{\"id\":\"concept-organisation\",\"uuid\":\"2bd185c5-a9b6-36ee-8bea-3dc3251b28e7\",\"status\":\"unavailable\"},\"@entity\":\"reference\"}],\"base\":\"agent\"},\"@entity\":\"reference\"},\"created\":1633515854787,\"formatted\":\"<div><p>Van
        Gogh is today one of the most popular of the <a href=\\\"/paintings/glossary/post-impressionism\\\">Post-Impressionist</a>
        painters, although he was not widely appreciated during his lifetime. He is
        now famed for the great vitality of his works which are characterised by expressive
        and emotive use of brilliant colour and energetic application of <a href=\\\"/paintings/glossary/impasto\\\">impastoed
        </a>paint. The traumas of his life, documented in his letters, have tended
        to dominate and distort modern perceptions of his art.</p></div><p>Van Gogh
        was born in Holland, the son of a pastor; he travelled to London in 1873,
        and first visited Paris in 1874. Over the next decade he was employed in various
        ways, including as a lay preacher. By 1883 he had started painting, and in
        1885-6 he attended the academy in Antwerp where he was impressed by Japanese
        prints and by the work of <a href=\\\"/artists/peter-paul-rubens\\\">Rubens</a>.
        On his return to Paris in 1886 he met artists such as <a href=\\\"/artists/hilaire-germain-edgar-degas\\\">Degas</a>,
        <a href=\\\"/artists/paul-gauguin\\\">Gauguin</a> and <a href=\\\"/artists/georges-seurat\\\">Seurat</a>,
        and as a result lightened the colours he used.<br /><br />In 1888 Van Gogh
        settled in Arles in Provence, where he was visited by Gauguin and painted
        his now famous series of 'Sunflowers'. In the following year a nervous breakdown
        brought him to a sanatorium at St Remy; it was at this period that he executed
        <a href=\\\"/paintings/vincent-van-gogh-a-wheatfield-with-cypresses\\\">'A
        Wheatfield, with Cypresses'</a>. In 1890, suffering from a new bout of depression,
        he shot himself in the chest and died two days later.</p>\",\"source\":\"TMS\",\"type\":\"web
        text\",\"value\":\"Van Gogh is today one of the most popular of the Post-Impressionist
        painters, although he was not widely appreciated during his lifetime. He is
        now famed for the great vitality of his works which are characterised by expressive
        and emotive use of brilliant colour and energetic application of impastoed
        paint. The traumas of his life, documented in his letters, have tended to
        dominate and distort modern perceptions of his art.Van Gogh was born in Holland,
        the son of a pastor; he travelled to London in 1873, and first visited Paris
        in 1874. Over the next decade he was employed in various ways, including as
        a lay preacher. By 1883 he had started painting, and in 1885-6 he attended
        the academy in Antwerp where he was impressed by Japanese prints and by the
        work of Rubens. On his return to Paris in 1886 he met artists such as Degas,
        Gauguin and Seurat, and as a result lightened the colours he used.\\r\\n\\r\\nIn
        1888 Van Gogh settled in Arles in Provence, where he was visited by Gauguin
        and painted his now famous series of 'Sunflowers'. In the following year a
        nervous breakdown brought him to a sanatorium at St Remy; it was at this period
        that he executed 'A Wheatfield, with Cypresses'. In 1890, suffering from a
        new bout of depression, he shot himself in the chest and died two days later.\",\"status\":\"Active\"}]}},{\"_index\":\"public\",\"_type\":\"data\",\"_id\":\"0P5D-0001-0000-0000\",\"_score\":10.128778,\"_ignored\":[\"description.formatted.keyword\",\"description.__web_text.keyword\"],\"_source\":{\"date\":[{\"from\":\"1604\",\"to\":\"1671\",\"value\":\"1604/5
