        studying at the famous University of Leiden (unusual for a miller's son),
        but academic life did not suit him. After a few months he left to begin an
        apprenticeship as a painter.Leiden did not offer much in the way of artistic
        talent, and in 1624, after three years with a local painter, Rembrandt went
        to Amsterdam to study briefly with Pieter Lastman. He then moved back to Leiden
        and set up as an independent painter, sharing a workshop with Jan Lievens.
        It was not an easy climate in which to work. Following the Protestant Reformation,
