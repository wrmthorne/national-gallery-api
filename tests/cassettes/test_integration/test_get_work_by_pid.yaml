        for painting and enjoyment for the senses. He also hoped\\r\\nhe might be
        able to form a new community of artists and make a fresh start.\\r\\nSunflowers
        invites us to experience joy in the midst of uncertainty and change.\\r\\nVan
        Gogh compared the series of sunflower paintings he produced in the summer\\r\\nof
        1888 to \u2018stained glass windows\u2019 and to \u2018a symphony in blue
        and yellow\u2019. He\\r\\noffered them as a precious gift, using them to decorate
        the room which his\\r\\nbrother Theo and his friend the artist Paul Gauguin
