        label\",\"value\":\"Each stalk, petal, and seed is different. Most of the
        flowers have become seed-heads, their petals past their peak. When Vincent
        van Gogh travelled to Arles in the south of France, he anticipated a utopia
        filled with abundant subjects for painting and enjoyment for the senses. He
        also hoped he might be able to form a new community of artists and make a
        fresh start. Sunflowers invites us to experience joy in the midst of uncertainty
        and change. Van Gogh compared the series of sunflower paintings he produced
        in the summer of 1888 to \u2018stained glass windows\u2019 and to \u2018a
        symphony in blue and yellow\u2019. He offered them as a precious gift, using
        them to decorate the room which his brother Theo and his friend the artist
        Paul Gauguin would use when they stayed with him. This painting is a manifestation
        of a foundational belief held by van Gogh, that \u2018the joy of others may
        embitter jealous hearts, but it fortifies submissive hearts; it is the ray
        of sunshine that opens up those two lovely flowers called \u201Cconfidence\u201D
        and \u201Chope\u201D.\u2019\"},{\"type\":\"formatted online label\",\"value\":\"<font
